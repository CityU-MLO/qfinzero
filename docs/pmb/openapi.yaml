openapi: 3.0.0
info:
  title: PMB - Paper Money Broker API
  description: |
    Step-driven paper trading broker for backtesting AI trading agents.
    Supports stocks and options with margin accounting, deterministic replay,
    and comprehensive event streams.

    PMB requires UPQ service for market data. Sessions prefetch all needed
    bars at creation time for zero I/O during stepping.
  version: 0.1.0
  contact:
    name: QFinZero

servers:
  - url: http://localhost:19320/v1
    description: Local development server

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"

  /accounts:
    post:
      operationId: createAccount
      summary: Create a trading account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequest'
      responses:
        '200':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'

  /accounts/{account_id}:
    get:
      operationId: getAccount
      summary: Get account snapshot
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Account snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '404':
          description: Account not found

  /sessions:
    post:
      operationId: createSession
      summary: Create a replay session
      description: |
        Creates a new simulation session. Prefetches all market data from UPQ
        for the specified universe and time range. After creation, advance time
        with POST /sessions/{id}/step.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '200':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'

  /sessions/{session_id}/step:
    post:
      operationId: stepSession
      summary: Advance simulation clock
      description: |
        Advance the session clock by the specified number of steps.
        Returns events in fixed order: MARKET_TICK, ORDER_EVENT, TRADE_EVENT,
        ACCOUNT_SNAPSHOT, RISK_EVENT.
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                step:
                  type: integer
                  default: 1
                  description: Number of steps to advance
      responses:
        '200':
          description: Step result with events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StepResponse'

  /sessions/{session_id}/summary:
    get:
      operationId: getSessionSummary
      summary: Get session performance summary
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionSummary'

  /orders:
    post:
      operationId: placeOrder
      summary: Place an order
      description: |
        Place a new order. Idempotent via client_order_id — duplicate
        submissions with the same client_order_id are rejected.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceOrderRequest'
      responses:
        '200':
          description: Order accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'

  /orders/{order_id}/cancel:
    post:
      operationId: cancelOrder
      summary: Cancel an order
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order cancelled
        '404':
          description: Order not found

components:
  schemas:
    CreateAccountRequest:
      type: object
      required: [initial_cash, start_date]
      properties:
        account_type:
          type: string
          enum: [CASH, MARGIN]
          default: MARGIN
        initial_cash:
          type: number
          format: double
          example: 100000.0
        start_date:
          type: string
          format: date
          example: "2025-01-06"

    Account:
      type: object
      properties:
        account_id:
          type: string
        account_type:
          type: string
        cash:
          type: number
          format: double
        equity:
          type: number
          format: double
        buying_power:
          type: number
          format: double
        positions:
          type: array
          items:
            $ref: '#/components/schemas/Position'

    Position:
      type: object
      properties:
        instrument:
          $ref: '#/components/schemas/Instrument'
        qty:
          type: integer
        avg_cost:
          type: number
          format: double
        market_value:
          type: number
          format: double
        unrealized_pnl:
          type: number
          format: double

    Instrument:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [STOCK, OPTION]
        symbol:
          type: string
          description: Ticker for stocks, OPRA symbol for options
          example: "AAPL"

    CreateSessionRequest:
      type: object
      required: [account_id, frequency, start_ts, end_ts, universe]
      properties:
        account_id:
          type: string
        frequency:
          type: string
          enum: ["1m", "1d"]
        start_ts:
          type: string
          description: Start timestamp (ISO datetime or date)
          example: "2025-01-06T09:30:00"
        end_ts:
          type: string
          description: End timestamp (ISO datetime or date)
          example: "2025-01-06T16:00:00"
        universe:
          type: object
          properties:
            stocks:
              type: array
              items:
                type: string
              example: ["AAPL", "MSFT"]
            options:
              type: array
              items:
                type: string
        reproducibility:
          type: object
          properties:
            seed:
              type: integer
              example: 42

    Session:
      type: object
      properties:
        session_id:
          type: string
        account_id:
          type: string
        frequency:
          type: string
        status:
          type: string
          enum: [CREATED, RUNNING, FINISHED]

    StepResponse:
      type: object
      properties:
        ok:
          type: boolean
        clock:
          type: object
          properties:
            current_ts:
              type: string
              format: date-time
            status:
              type: string
              enum: [RUNNING, FINISHED]
        events:
          type: array
          items:
            $ref: '#/components/schemas/Event'

    Event:
      type: object
      properties:
        type:
          type: string
          enum: [MARKET_TICK, ORDER_EVENT, TRADE_EVENT, ACCOUNT_SNAPSHOT, RISK_EVENT, SESSION_EVENT]
        payload:
          type: object

    SessionSummary:
      type: object
      properties:
        final_equity:
          type: number
          format: double
        total_return:
          type: number
          format: double
        max_drawdown:
          type: number
          format: double
        fees_paid:
          type: number
          format: double
        num_orders:
          type: integer
        num_trades:
          type: integer

    PlaceOrderRequest:
      type: object
      required: [session_id, account_id, client_order_id, order]
      properties:
        session_id:
          type: string
        account_id:
          type: string
        client_order_id:
          type: string
          description: Idempotency key
        order:
          type: object
          required: [instrument, side, order_type, qty, time_in_force]
          properties:
            instrument:
              $ref: '#/components/schemas/Instrument'
            side:
              type: string
              enum: [BUY, SELL]
            order_type:
              type: string
              enum: [MARKET, LIMIT, STOP, STOP_LIMIT]
            qty:
              type: integer
            limit_price:
              type: number
              format: double
            stop_price:
              type: number
              format: double
            time_in_force:
              type: string
              enum: [DAY, GTC, GTD]

    Order:
      type: object
      properties:
        order_id:
          type: string
        client_order_id:
          type: string
        status:
          type: string
          enum: [PENDING, OPEN, FILLED, PARTIALLY_FILLED, CANCELLED, REJECTED]
        instrument:
          $ref: '#/components/schemas/Instrument'
        side:
          type: string
        order_type:
          type: string
        qty:
          type: integer
        filled_qty:
          type: integer
