openapi: 3.0.0
info:
  title: UPQ API
  description: |
    UPQ (Rust Price Query Service) - Price query service with API compatibility against the Python price_query_service.
    
    ## Date/Time Formats
    - **ISO Datetime**: `YYYY-MM-DDTHH:MM:SS` (required for minute-level endpoints)
    - **Date**: `YYYY-MM-DD` (for daily endpoints)
    
    ## Error Responses
    All errors return JSON with `code` and `message` fields:
    ```json
    {
      "code": "invalid_argument",
      "message": "start/end must be ISO datetime: YYYY-MM-DDTHH:MM:SS"
    }
    ```
  version: 0.1.0
  contact:
    name: UPQ Team

servers:
  - url: http://localhost:19350
    description: Local development server

paths:
  /health:
    get:
      summary: Health Check
      description: Returns service health status
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"

  /health/freshness:
    get:
      summary: Data Freshness
      description: |
        Returns data freshness information for all UPQ data sources.
        Reports latest timestamps, record counts, unique key counts, and partition info
        for each Parquet-partitioned dataset and the rates CSV.
      operationId: healthFreshness
      responses:
        '200':
          description: Freshness information for all data sources
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreshnessResponse'

  /stock:
    get:
      summary: Stock Minute Data
      description: |
        Query stock minute-level data. 
        **Note**: Requires ISO datetime format (YYYY-MM-DDTHH:MM:SS) for start/end.
      operationId: getStockMinute
      parameters:
        - name: tickers
          in: query
          required: true
          description: Comma-separated list of stock tickers (e.g., "AAPL,MSFT")
          schema:
            type: string
            example: "AAPL"
        - name: start
          in: query
          required: true
          description: Start datetime in ISO format (YYYY-MM-DDTHH:MM:SS)
          schema:
            type: string
            format: date-time
            example: "2025-01-06T09:30:00"
        - name: end
          in: query
          required: true
          description: End datetime in ISO format (YYYY-MM-DDTHH:MM:SS)
          schema:
            type: string
            format: date-time
            example: "2025-01-06T16:00:00"
        - name: fields
          in: query
          required: false
          description: Comma-separated fields to return. Default includes all fields.
          schema:
            type: string
            example: "ticker,window_start,close"
        - name: limit
          in: query
          required: false
          description: Maximum rows to return (1-100000, default 10000)
          schema:
            type: integer
            minimum: 1
            maximum: 100000
            default: 10000
      responses:
        '200':
          description: Successful query
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StockMinuteRecord'
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /stock/daily:
    get:
      summary: Stock Daily Data
      description: |
        Query stock daily (OHLC) data.
        **Note**: Requires date format (YYYY-MM-DD) for start/end.
      operationId: getStockDaily
      parameters:
        - name: tickers
          in: query
          required: true
          description: Comma-separated list of stock tickers
          schema:
            type: string
            example: "AAPL"
        - name: start
          in: query
          required: true
          description: Start date (YYYY-MM-DD)
          schema:
            type: string
            format: date
            example: "2025-01-01"
        - name: end
          in: query
          required: true
          description: End date (YYYY-MM-DD)
          schema:
            type: string
            format: date
            example: "2025-12-31"
        - name: fields
          in: query
          required: false
          description: Comma-separated fields to return
          schema:
            type: string
            example: "ticker,date,close"
      responses:
        '200':
          description: Successful query
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StockDailyRecord'
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /option:
    get:
      summary: Option Endpoints Metadata
      description: Returns available option query endpoints
      operationId: getOptionMetadata
      responses:
        '200':
          description: Metadata for option endpoints
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticker_query_path:
                    type: string
                    example: "/option/ticker_query"
                  chain_query_path:
                    type: string
                    example: "/option/chain_query"

  /option/ticker_query:
    get:
      summary: Option Ticker Query
      description: |
        Query option data by specific contract (ticker).
        Accepts date format (YYYY-MM-DD) or datetime format (YYYY-MM-DDTHH:MM:SS).
      operationId: getOptionByTicker
      parameters:
        - name: contract
          in: query
          required: true
          description: OPRA option contract symbol (e.g., "O:AAPL250117C00150000")
          schema:
            type: string
            example: "O:NVDA250117C00136000"
        - name: start
          in: query
          required: true
          description: Start date or datetime
          schema:
            type: string
            example: "2025-01-10"
        - name: end
          in: query
          required: true
          description: End date or datetime
          schema:
            type: string
            example: "2025-01-10"
        - name: resolution
          in: query
          required: false
          description: Data resolution (day or minute)
          schema:
            type: string
            enum: [day, minute]
            default: day
        - name: fields
          in: query
          required: false
          description: Comma-separated fields to return
          schema:
            type: string
        - name: include_greeks
          in: query
          required: false
          description: |
            When true, compute and append BSM-European Greeks fields to each row.
            Warning: Greeks use European-style BSM approximation even for American-style options.
          schema:
            type: boolean
            default: false
        - name: greek_model
          in: query
          required: false
          description: Pricing model for Greeks computation (only "bsm" supported in V1)
          schema:
            type: string
            enum: [bsm]
            default: bsm
        - name: greek_price_field
          in: query
          required: false
          description: Which price field to use for IV inversion (only "close" supported in V1)
          schema:
            type: string
            enum: [close]
            default: close
      responses:
        '200':
          description: Successful query
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OptionRecord'
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /option/chain_query:
    get:
      summary: Option Chain Query
      description: |
        Query option chain by underlying asset with optional filters.
        Returns all options for a given underlying on a specific date.
        For exact expiry queries (`expiry_min == expiry_max`), if no rows match,
        the service automatically falls back to the nearest available expiry:
        first within ±7 calendar days, then (if still empty) within the same calendar month.
        Fallback candidate search stays within the same underlying/type/strike filter context.
        Nearest is selected by absolute day difference; ties pick the earlier expiry.
      operationId: getOptionChain
      parameters:
        - name: underlying
          in: query
          required: true
          description: Underlying asset ticker
          schema:
            type: string
            example: "NVDA"
        - name: date
          in: query
          required: true
          description: Trade date (YYYY-MM-DD)
          schema:
            type: string
            format: date
            example: "2025-01-15"
        - name: expiry_min
          in: query
          required: false
          description: |
            Minimum expiration date filter.
            If `expiry_min` equals `expiry_max` and no exact rows exist,
            nearest-expiry fallback may apply.
          schema:
            type: string
            format: date
        - name: expiry_max
          in: query
          required: false
          description: |
            Maximum expiration date filter.
            If `expiry_min` equals `expiry_max` and no exact rows exist,
            nearest-expiry fallback may apply.
          schema:
            type: string
            format: date
        - name: strike_min
          in: query
          required: false
          description: Minimum strike price filter
          schema:
            type: number
            format: double
        - name: strike_max
          in: query
          required: false
          description: Maximum strike price filter
          schema:
            type: number
            format: double
        - name: type
          in: query
          required: false
          description: Option type filter (C for Call, P for Put)
          schema:
            type: string
            enum: [C, P]
        - name: fields
          in: query
          required: false
          description: Comma-separated fields to return
          schema:
            type: string
        - name: include_greeks
          in: query
          required: false
          description: |
            When true, compute and append BSM-European Greeks fields to each row.
            Warning: Greeks use European-style BSM approximation even for American-style options.
            When expiry fallback occurs, Greeks are computed using the actual returned expiry.
          schema:
            type: boolean
            default: false
        - name: greek_model
          in: query
          required: false
          description: Pricing model for Greeks computation (only "bsm" supported in V1)
          schema:
            type: string
            enum: [bsm]
            default: bsm
        - name: greek_price_field
          in: query
          required: false
          description: Which price field to use for IV inversion (only "close" supported in V1)
          schema:
            type: string
            enum: [close]
            default: close
      responses:
        '200':
          description: Successful query
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OptionChainRecord'
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /rates/query:
    get:
      summary: Treasury Yields Query
      description: Query treasury yield data for various tenors
      operationId: getRates
      parameters:
        - name: start
          in: query
          required: true
          description: Start date (YYYY-MM-DD)
          schema:
            type: string
            format: date
            example: "2025-01-01"
        - name: end
          in: query
          required: true
          description: End date (YYYY-MM-DD)
          schema:
            type: string
            format: date
            example: "2025-01-31"
        - name: tenors
          in: query
          required: false
          description: |
            Comma-separated list of tenors to return. 
            Available: 1M, 3M, 1Y, 2Y, 5Y, 10Y, 30Y
            Defaults to all if not specified.
          schema:
            type: string
            example: "1M,10Y"
      responses:
        '200':
          description: Successful query
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RateRecord'
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    StockMinuteRecord:
      type: object
      properties:
        ticker:
          type: string
          description: Stock ticker symbol
          example: "AAPL"
        window_start:
          type: integer
          description: Timestamp in nanoseconds since epoch
          example: 1736155800000000000
        open:
          type: number
          format: double
          description: Opening price
          example: 100.0
        high:
          type: number
          format: double
          description: High price
          example: 101.0
        low:
          type: number
          format: double
          description: Low price
          example: 99.0
        close:
          type: number
          format: double
          description: Closing price
          example: 100.5
        volume:
          type: integer
          description: Trading volume
          example: 1000
        transactions:
          type: integer
          description: Number of transactions
          example: 10

    StockDailyRecord:
      type: object
      properties:
        ticker:
          type: string
          description: Stock ticker symbol
        date:
          type: string
          format: date
          description: Trade date
          example: "2025-01-06"
        open:
          type: number
          format: double
        high:
          type: number
          format: double
        low:
          type: number
          format: double
        close:
          type: number
          format: double
        volume:
          type: integer
        transactions:
          type: integer

    OptionRecord:
      description: |
        Option ticker query row. Day resolution includes underlying/expiry/strike/type
        fields; minute resolution omits them. When include_greeks=true, Greek fields are appended.
      allOf:
        - type: object
          properties:
            ticker:
              type: string
              description: Option contract OPRA symbol
              example: "O:NVDA250117C00136000"
            underlying:
              type: string
              description: Underlying asset ticker (day resolution only)
            expiry:
              type: string
              format: date
              description: Option expiration date (day resolution only)
            strike:
              type: number
              format: double
              description: Strike price (day resolution only)
            type:
              type: string
              enum: [C, P]
              description: Option type, aliased from "right" column (day resolution only)
            window_start:
              type: integer
              description: Timestamp in nanoseconds
            open:
              type: number
              format: double
            high:
              type: number
              format: double
            low:
              type: number
              format: double
            close:
              type: number
              format: double
            volume:
              type: integer
            transactions:
              type: integer
        - $ref: '#/components/schemas/GreekFields'

    OptionChainRecord:
      description: |
        Option chain query row. When include_greeks=true, Greek fields are appended.
      allOf:
        - type: object
          properties:
            contract:
              type: string
              description: Option contract symbol
            underlying:
              type: string
              description: Underlying asset ticker
            expiry:
              type: string
              format: date
              description: Option expiration date
            strike:
              type: number
              format: double
              description: Strike price
            type:
              type: string
              enum: [C, P]
              description: Option type (Call or Put), aliased from "right" column
            window_start:
              type: integer
            open:
              type: number
              format: double
            high:
              type: number
              format: double
            low:
              type: number
              format: double
            close:
              type: number
              format: double
            volume:
              type: integer
            transactions:
              type: integer
        - $ref: '#/components/schemas/GreekFields'

    RateRecord:
      type: object
      properties:
        date:
          type: string
          format: date
          description: Rate date
          example: "2025-01-02"
        yield_1_month:
          type: number
          format: double
          description: 1-month yield
        yield_3_month:
          type: number
          format: double
          description: 3-month yield
        yield_1_year:
          type: number
          format: double
          description: 1-year yield
        yield_2_year:
          type: number
          format: double
          description: 2-year yield
        yield_5_year:
          type: number
          format: double
          description: 5-year yield
        yield_10_year:
          type: number
          format: double
          description: 10-year yield
        yield_30_year:
          type: number
          format: double
          description: 30-year yield

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Error code
          enum: [invalid_argument, internal_error]
          example: "invalid_argument"
        message:
          type: string
          description: Human-readable error message
          example: "start/end must be ISO datetime: YYYY-MM-DDTHH:MM:SS"

    FreshnessResponse:
      type: object
      properties:
        service:
          type: string
          example: "upq"
        checked_at:
          type: string
          format: date-time
          description: ISO timestamp when freshness was checked
        sources:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/FreshnessSource'
          description: Map of data source name to freshness info
          example:
            stock_minute:
              latest_date: "2025-01-31"
              latest_timestamp: 1738339200000000000
              record_count: 50000
              unique_keys: 150
              unique_key_label: "tickers"
              partition_count: 22

    FreshnessSource:
      type: object
      properties:
        latest_date:
          type: string
          format: date
          nullable: true
          description: Latest partition date (YYYY-MM-DD)
        latest_timestamp:
          type: integer
          nullable: true
          description: Latest window_start in nanoseconds (for minute-resolution datasets)
        record_count:
          type: integer
          description: Number of records in the latest partition
        unique_keys:
          type: integer
          description: Number of unique tickers (or tenors for rates)
        unique_key_label:
          type: string
          description: Label for unique_keys (e.g., "tickers" or "tenors")
        partition_count:
          type: integer
          description: Total number of date partitions

    GreekFields:
      type: object
      description: |
        BSM-European Greeks fields. Appended to option rows when include_greeks=true.
        Warning: Uses European-style BSM approximation. May not be accurate for American-style options.
      properties:
        iv:
          type: number
          format: double
          nullable: true
          description: Implied volatility (annualized)
        delta:
          type: number
          format: double
          nullable: true
          description: Option delta
        gamma:
          type: number
          format: double
          nullable: true
          description: Option gamma
        theta:
          type: number
          format: double
          nullable: true
          description: Option theta (per day)
        vega:
          type: number
          format: double
          nullable: true
          description: Option vega (per 1% vol change)
        rho:
          type: number
          format: double
          nullable: true
          description: Option rho (per 1% rate change)
        greek_status:
          type: string
          enum: [ok, below_intrinsic, no_bracket, non_finite_input, near_expiry_approx, missing_spot, missing_rate, model_error]
          description: Status of Greeks computation for this row
        greek_meta:
          $ref: '#/components/schemas/GreekMeta'

    GreekMeta:
      type: object
      description: Metadata about the Greeks computation model and conventions
      properties:
        model:
          type: string
          example: "bsm_european"
        style_assumption:
          type: string
          example: "European"
        dividend_assumption:
          type: string
          example: "q0"
        theta_unit:
          type: string
          example: "per_day"
        vega_unit:
          type: string
          example: "per_1pct_vol"
        rho_unit:
          type: string
          example: "per_1pct_rate"
        spot_source:
          type: string
          example: "stock_daily"
        rate_source:
          type: string
          example: "rates_parquet"
        t_convention:
          type: string
          example: "calendar_days_over_365"
        expiry_anchor:
          type: string
          example: "expiry_date_16_00_ET"
