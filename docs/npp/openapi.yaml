openapi: 3.0.0
info:
  title: NPP - News Pushing Pipeline API
  description: |
    News ingestion, cleaning, tagging, and push pipeline for downstream
    trading systems and AI agents. Collects from multiple sources (RSS, APIs,
    scrapers) and provides structured, deduplicated news data.
  version: 0.1.0
  contact:
    name: QFinZero

servers:
  - url: http://localhost:19330
    description: Local development server

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"

  /news/push:
    post:
      operationId: pushNews
      summary: Push a news item
      description: |
        Push a news item into the pipeline. The item will be cleaned,
        tagged, scored, and forwarded to registered downstream consumers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewsItem'
      responses:
        '200':
          description: News item accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                    example: "accepted"

  /news/query:
    get:
      operationId: queryNews
      summary: Query stored news
      parameters:
        - name: ticker
          in: query
          required: false
          description: Filter by ticker symbol
          schema:
            type: string
            example: "AAPL"
        - name: start
          in: query
          required: false
          description: Start date (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: end
          in: query
          required: false
          description: End date (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: source
          in: query
          required: false
          description: Filter by news source
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Maximum items to return
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Matching news items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NewsItem'

  /news/sources:
    get:
      operationId: listSources
      summary: List available news sources
      responses:
        '200':
          description: Available sources
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    type:
                      type: string
                      enum: [rss, api, scraper]
                    status:
                      type: string
                      enum: [active, inactive]

  /news/earnings:
    get:
      operationId: queryEarnings
      summary: Query earnings announcements
      parameters:
        - name: ticker
          in: query
          required: false
          schema:
            type: string
        - name: start
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: end
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Earnings data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EarningsEvent'

  /news/economic_events:
    get:
      operationId: queryEconomicEvents
      summary: Query economic calendar events
      parameters:
        - name: start
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: end
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: type
          in: query
          required: false
          description: Event type filter (e.g., FOMC, CPI, NFP)
          schema:
            type: string
      responses:
        '200':
          description: Economic events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EconomicEvent'

components:
  schemas:
    NewsItem:
      type: object
      properties:
        id:
          type: string
        headline:
          type: string
          example: "Apple Reports Record Q4 Earnings"
        body:
          type: string
        source:
          type: string
          example: "Bloomberg"
        timestamp:
          type: string
          format: date-time
        tickers:
          type: array
          items:
            type: string
          example: ["AAPL"]
        tags:
          type: array
          items:
            type: string
          example: ["earnings", "tech"]
        priority:
          type: number
          format: double
          description: Priority score (0-1)

    EarningsEvent:
      type: object
      properties:
        ticker:
          type: string
        report_date:
          type: string
          format: date
        fiscal_quarter:
          type: string
        eps_estimate:
          type: number
          format: double
        eps_actual:
          type: number
          format: double
        revenue_estimate:
          type: number
          format: double
        revenue_actual:
          type: number
          format: double

    EconomicEvent:
      type: object
      properties:
        event_type:
          type: string
          example: "FOMC"
        date:
          type: string
          format: date
        description:
          type: string
        actual:
          type: string
        forecast:
          type: string
        previous:
          type: string
